<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">

<title>Viewer</title>

<style>

body{
margin:0;
background:black;
}

iframe{
width:100%;
height:100vh;
border:none;
}

</style>
</head>

<body>

<iframe id="pdfFrame"></iframe>

<script>

let url=localStorage.getItem("pdfURL")

if(url){
document.getElementById("pdfFrame").src=url
}

</script>

</body>
</html>
