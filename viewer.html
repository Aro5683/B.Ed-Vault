<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>PDF Viewer</title>

<style>

body{
margin:0;
background:#000;
}

iframe{
width:100%;
height:100vh;
border:none;
background:white;
}

</style>

</head>

<body>

<iframe id="pdfFrame"></iframe>

<script>

const params = new URLSearchParams(window.location.search)

const file = params.get("file")

if(file){

document.getElementById("pdfFrame").src = decodeURIComponent(file)

}else{

document.body.innerHTML =
"<h2 style='color:white;text-align:center;margin-top:40px'>No PDF Loaded</h2>"

}

</script>

</body>

</html>
