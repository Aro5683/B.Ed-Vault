<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PDF Viewer</title>

<style>
body{margin:0;background:#000}
iframe{width:100%;height:100vh;border:none;background:white}
</style>

</head>

<body>

<iframe id="pdfFrame"></iframe>

<script>

function openDB(){
return new Promise((resolve,reject)=>{

const req=indexedDB.open("pdfDB",1)

req.onsuccess=e=>resolve(e.target.result)
req.onerror=e=>reject(e)

})
}

async function loadPDF(){

const db=await openDB()

const tx=db.transaction("files","readonly")
const store=tx.objectStore("files")

const req=store.get("pdf")

req.onsuccess=function(){

const blob=req.result

if(blob){

const url=URL.createObjectURL(blob)
document.getElementById("pdfFrame").src=url

}else{

document.body.innerHTML="<h2 style='color:white;text-align:center;margin-top:40px'>No PDF Loaded</h2>"

}

}

}

loadPDF()

</script>

</body>
</html>
