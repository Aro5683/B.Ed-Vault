<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>PDF Viewer</title>

<style>

body{
margin:0;
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

iframe{
width:100%;
height:100vh;
border:none;
}

#openBtn{
background:#2b6fd4;
color:white;
border:none;
padding:25px 60px;
font-size:28px;
border-radius:20px;
cursor:pointer;
}

</style>

</head>

<body>

<button id="openBtn">Open PDF</button>

<iframe id="pdfFrame" style="display:none"></iframe>

<script>

const url = localStorage.getItem("tempPDF")

const btn = document.getElementById("openBtn")
const frame = document.getElementById("pdfFrame")

btn.onclick = function(){

frame.src = url
frame.style.display = "block"
btn.style.display = "none"

}

</script>

</body>
</html>
