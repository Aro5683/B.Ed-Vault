<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>B.Ed Vault</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:#eef4ff;
}

header{
background:#0a6cff;
color:white;
padding:16px;
text-align:center;
font-size:20px;
font-weight:600;
}

.container{
padding:18px;
max-width:900px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:14px;
margin-bottom:20px;
box-shadow:0 8px 30px rgba(0,0,0,0.08);
}

button{
background:#0a6cff;
color:white;
border:none;
padding:10px 16px;
border-radius:8px;
cursor:pointer;
}

.notice{
background:white;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
}

.popupBox{
background:white;
padding:25px;
border-radius:14px;
width:90%;
max-width:400px;
text-align:center;
}

.popupBox input,
.popupBox select{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ddd;
border-radius:8px;
}

</style>
</head>

<body>

<header>B.Ed Vault</header>

<div class="container">

<div class="card">

<h3>Decrypt PDF</h3>

<button onclick="openDecrypt()">Open Decrypt Tool</button>

</div>

<div class="card">

<h3>TNTEU Notifications</h3>

<div id="noticeList"></div>

</div>

</div>

<!-- SUB POPUP -->

<div id="subPopup" class="popup">

<div class="popupBox">

<h2>B.Ed Vault Access</h2>

<p>Activate your device</p>

<h3>₹149</h3>

<button onclick="openForm()">Proceed</button>

</div>

</div>

<!-- FORM -->

<div id="formPopup" class="popup">

<div class="popupBox">

<h3>Enter Details</h3>

<input id="nameInput" placeholder="Name">
<input id="ageInput" placeholder="Age">

<select id="genderInput">
<option value="">Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<input id="deviceId" readonly>

<button onclick="sendWhatsapp()">Send</button>

</div>

</div>

<script>

/* ACTIVATED DEVICE LIST */

const activatedDevices=[
"DEV-aqsbyel7f",
  "DEV-5ukqa7g5w"
]

function getDeviceId(){

let id=localStorage.getItem("bed_id")

if(!id){

id="DEV-"+Math.random().toString(36).substr(2,9)

localStorage.setItem("bed_id",id)

}

return id

}

/* OPEN DECRYPT */

function openDecrypt(){

if(!activatedDevices.includes(getDeviceId())){
subPopup.style.display="flex"
return
}

location.href="decrypt.html"

}

/* FORM */

function openForm(){

subPopup.style.display="none"
formPopup.style.display="flex"

deviceId.value=getDeviceId()

}

/* WHATSAPP */

function sendWhatsapp(){

let name=nameInput.value
let age=ageInput.value
let gender=genderInput.value

if(!name||!age||!gender)return

let msg=`Name:${name}
Age:${age}
Gender:${gender}
Device:${getDeviceId()}

Please activate.`

window.open("https://wa.me/919655969516?text="+encodeURIComponent(msg))

}

/* NOTIFICATIONS */

async function loadNotifications(){

if(!activatedDevices.includes(getDeviceId())) return

const proxy="https://api.codetabs.com/v1/proxy/?quest="
const target="https://www.tnteu.ac.in/notifications.php?nid=5"

const res=await fetch(proxy+encodeURIComponent(target))
const html=await res.text()

const doc=new DOMParser().parseFromString(html,"text/html")

const links=doc.querySelectorAll(".sectionWrapper a")

links.forEach((a,i)=>{

if(i>8)return

let div=document.createElement("div")

div.className="notice"

div.innerText=a.innerText

noticeList.appendChild(div)

})

}

loadNotifications()

</script>

</body>
</html>
