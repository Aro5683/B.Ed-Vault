<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>B.Ed Vault</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0077ff">
<link rel="apple-touch-icon" href="icon-192.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:#eef2f7;
padding:20px;
color:#222;
}

#bedFile{
display:none;
}

/* HEADER */

header{
text-align:center;
margin-bottom:24px;
}

header h1{
font-size:32px;
color:#0077ff;
}

/* CONTAINER */

.container{
max-width:900px;
margin:auto;
}

/* UPLOAD */

.uploadBox{
background:white;
padding:20px;
margin-bottom:25px;
border-radius:6px;
}

.uploadArea{
border:2px dashed #7bb7ff;
padding:25px;
background:#f7fbff;
cursor:pointer;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:120px;
text-align:center;
}

.uploadArea span{
font-size:14px;
}

#fileName{
font-size:13px;
margin-top:6px;
color:#666;
}

/* BUTTON */

button{
background:#0077ff;
color:white;
border:none;
padding:8px 16px;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#005fd1;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
margin-bottom:20px;
}

tr{
border-bottom:1px solid #ddd;
}

td{
padding:12px;
}

.fileName{
font-weight:600;
}

.author{
font-size:13px;
color:#666;
}

.downloadCell{
text-align:right;
}

/* SELECT */

select{
padding:6px;
border-radius:4px;
border:1px solid #ccc;
margin-bottom:12px;
}

/* POPUPS */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
display:none;
align-items:center;
justify-content:center;
padding:20px;
z-index:999;
}

.popupContent{
background:white;
padding:20px;
max-width:420px;
width:100%;
text-align:center;
border-radius:6px;
}

.popupContent input,
.popupContent select{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
}

/* NOTIFICATIONS */

.notice-card{
background:white;
padding:14px;
margin-bottom:10px;
border-radius:6px;
}

.notice-title{
font-weight:500;
margin-bottom:6px;
}

.notice-link{
font-size:13px;
color:#0077ff;
text-decoration:none;
}

</style>

</head>

<body>

<button id="installBtn" style="display:none">Install App</button>

<header>
<h1>B.Ed Vault</h1>
</header>

<div class="container">

<div class="uploadBox">

<h3>Upload .bed File to Decrypt</h3>

<label class="uploadArea" onclick="bedFile.click()">

<span>Upload .bed file</span>
<div id="fileName">No file selected</div>

</label>

<input type="file" id="bedFile" accept=".bed">

<br>

<button onclick="decryptFile()">Decrypt File</button>

</div>

<h3>First Semester</h3>

<select id="mediumSelect" onchange="changeMedium()">
<option value="tamil">Tamil Medium</option>
<option value="english">English Medium</option>
</select>

<h4>Books</h4>
<table id="booksTable"></table>

<h4>Previous Year Questions</h4>
<table id="pyqTable"></table>

<h4>Important Questions</h4>
<table id="impTable"></table>

<h3>TNTEU Notifications</h3>
<div id="list"></div>

</div>

<!-- ACTIVATION POPUP -->

<div class="popup" id="activationPopup">

<div class="popupContent">

<h3>Device Activation Required</h3>

<p>Activate device to decrypt files</p>

<b>₹149</b>

<p>UPI: yourupi@upi</p>

<button onclick="showForm()">Proceed</button>

</div>

</div>

<!-- USER FORM -->

<div class="popup" id="formPopup">

<div class="popupContent">

<h3>User Details</h3>

<input id="name" placeholder="Name">
<input id="age" placeholder="Age">

<select id="gender">
<option value="">Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<input id="phone" placeholder="Phone Number">

<select id="promo">
<option value="">Allow promotional messages</option>
<option>Agree</option>
<option>Disagree</option>
</select>

<input id="deviceId" readonly>

<button onclick="sendWhatsapp()">Send</button>

</div>

</div>

<script>

/* ACTIVATED DEVICES */

const activatedDevices = {

"DEV-vfyd6p4ci": true

}

/* FILE NAME */

bedFile.onchange=function(){
fileName.innerText=this.files[0].name
}

/* DEVICE ID */

function getDeviceId(){

let id=localStorage.getItem("device_id")

if(!id){

id="DEV-"+Math.random().toString(36).substr(2,9)

localStorage.setItem("device_id",id)

}

return id

}

/* TABLE DATA */

const tamilData={
books:[
["BED_BOOK_T1","Dr Kumar","#"]
],
pyq:[
["BED_PYQ_T1","University","#"]
],
imp:[
["BED_IMP_T1","Faculty","#"]
]
}

const englishData={
books:[
["BED_BOOK_E1","Dr John","#"]
],
pyq:[
["BED_PYQ_E1","University","#"]
],
imp:[
["BED_IMP_E1","Faculty","#"]
]
}

/* LOAD TABLE */

function loadTable(id,data){

let html=""

data.forEach(x=>{

html+=`
<tr>
<td>
<div class="fileName">${x[0]}</div>
<div class="author">${x[1]}</div>
</td>
<td class="downloadCell">
<a href="${x[2]}"><button>Download</button></a>
</td>
</tr>`

})

document.getElementById(id).innerHTML=html

}

/* MEDIUM */

function changeMedium(){

let medium=mediumSelect.value

let data=medium==="tamil"?tamilData:englishData

loadTable("booksTable",data.books)
loadTable("pyqTable",data.pyq)
loadTable("impTable",data.imp)

}

changeMedium()

/* POPUPS */

function showForm(){

activationPopup.style.display="none"
formPopup.style.display="flex"

deviceId.value=getDeviceId()

}

/* WHATSAPP */

function sendWhatsapp(){

let name=name.value
let age=age.value
let gender=gender.value
let phone=phone.value
let promo=promo.value
let device=deviceId.value

if(!name||!age||!gender||!phone||!promo){

alert("Fill all details")
return

}

let msg=`Name:${name}
Age:${age}
Gender:${gender}
Phone:${phone}
Promo:${promo}
Device:${device}

I paid. Please activate.`

window.open(`https://wa.me/919655969516?text=${encodeURIComponent(msg)}`)

}

/* DECRYPT */

async function decryptFile(){

let file=bedFile.files[0]

if(!file){

alert("Upload .bed file")

return

}

let device=getDeviceId()

if(!activatedDevices[device]){

activationPopup.style.display="flex"

return

}

const buffer=await file.arrayBuffer()

const iv=buffer.slice(0,12)
const keyData=buffer.slice(12,44)
const encrypted=buffer.slice(44)

const key=await crypto.subtle.importKey("raw",keyData,{name:"AES-GCM"},false,["decrypt"])

const decrypted=await crypto.subtle.decrypt({name:"AES-GCM",iv:new Uint8Array(iv)},key,encrypted)

const blob=new Blob([decrypted],{type:"application/pdf"})

window.open(URL.createObjectURL(blob))

}

/* NOTIFICATIONS */

async function loadNotifications(){

if(!navigator.onLine)return

const list=document.getElementById("list")

try{

const proxy="https://api.codetabs.com/v1/proxy/?quest="
const target="https://www.tnteu.ac.in/notifications.php?nid=5"

const res=await fetch(proxy+encodeURIComponent(target))
const html=await res.text()

const doc=new DOMParser().parseFromString(html,"text/html")

const wrappers=doc.querySelectorAll(".sectionWrapper")

let links=[]

wrappers.forEach(w=>{
w.querySelectorAll("a").forEach(a=>links.push(a))
})

for(let i=0;i<Math.min(links.length,20);i++){

let url="https://www.tnteu.ac.in/"+links[i].getAttribute("href")

let div=document.createElement("div")

div.className="notice-card"

div.innerHTML=`
<div class="notice-title">${links[i].innerText}</div>
<a class="notice-link" href="${url}" target="_blank">Open Notification</a>
`

list.appendChild(div)

}

}catch{}

}

loadNotifications()

/* PWA INSTALL */

let deferredPrompt

window.addEventListener("beforeinstallprompt",(e)=>{

e.preventDefault()

deferredPrompt=e

installBtn.style.display="block"

})

installBtn.onclick=async()=>{

installBtn.style.display="none"

deferredPrompt.prompt()

}

</script>

</body>
</html>
