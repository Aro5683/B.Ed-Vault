<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>B.Ed Vault</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#eef2f7;
padding:20px;
color:#222;
}

#bedFile{
display:none;
}

header{
text-align:center;
margin-bottom:25px;
}

header h1{
font-size:32px;
color:#0077ff;
}

.container{
max-width:900px;
margin:auto;
}

.uploadBox{
background:white;
padding:20px;
margin-bottom:25px;
border-radius:8px;
}

.uploadArea{
border:2px dashed #7bb7ff;
padding:30px;
background:#f7fbff;
cursor:pointer;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:120px;
text-align:center;
}

#fileName{
margin-top:6px;
font-size:13px;
color:#666;
}

button{
background:#0077ff;
color:white;
border:none;
padding:10px 18px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#005fd1;
}

table{
width:100%;
border-collapse:collapse;
margin-bottom:20px;
}

tr{
border-bottom:1px solid #ddd;
}

td{
padding:12px;
}

.fileName{
font-weight:600;
}

.author{
font-size:13px;
color:#666;
}

.downloadCell{
text-align:right;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
display:none;
align-items:center;
justify-content:center;
}

.popupContent{
background:white;
padding:20px;
border-radius:8px;
max-width:420px;
width:100%;
text-align:center;
}

.popupContent input,
.popupContent select{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:5px;
}

</style>

</head>

<body>

<header>
<h1>B.Ed Vault</h1>
</header>

<div class="container">

<div class="uploadBox">

<h3>Upload .bed File to Decrypt</h3>

<label class="uploadArea" onclick="bedFile.click()">
Upload .bed file
<div id="fileName">No file selected</div>
</label>

<input type="file" id="bedFile" accept=".bed">

<br>

<button onclick="decryptFile()">Decrypt File</button>

</div>

</div>

<script>

/* ACTIVATED DEVICES */

const activatedDevices={
"DEV-demo123":true
}

/* FILE NAME */

bedFile.onchange=function(){
fileName.innerText=this.files[0].name
}

/* DEVICE ID */

function getDeviceId(){

let id=localStorage.getItem("device_id")

if(!id){

id="DEV-"+Math.random().toString(36).substr(2,9)

localStorage.setItem("device_id",id)

}

return id

}

/* DECRYPT */

async function decryptFile(){

let file=bedFile.files[0]

if(!file){

alert("Upload .bed file")
return

}

let device=getDeviceId()

if(!activatedDevices[device]){

alert("Device not activated")

return

}

const buffer=await file.arrayBuffer()

const iv=buffer.slice(0,12)
const keyData=buffer.slice(12,44)
const encrypted=buffer.slice(44)

const key=await crypto.subtle.importKey(
"raw",
keyData,
{name:"AES-GCM"},
false,
["decrypt"]
)

const decrypted=await crypto.subtle.decrypt(
{name:"AES-GCM",iv:new Uint8Array(iv)},
key,
encrypted
)

/* convert to base64 */

let base64 = btoa(
String.fromCharCode(...new Uint8Array(decrypted))
)

sessionStorage.setItem("pdfData",base64)

/* open viewer */

window.open("viewer.html","_blank")

}

</script>

</body>
</html>
