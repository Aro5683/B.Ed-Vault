<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>B.Ed Vault</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:#eef4ff;
}

/* HEADER */

header{
background:#0a6cff;
color:white;
padding:16px;
text-align:center;
font-size:22px;
font-weight:600;
}

/* CONTAINER */

.container{
padding:20px;
max-width:900px;
margin:auto;
}

/* CARD */

.card{
background:white;
padding:20px;
border-radius:14px;
margin-bottom:20px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

/* UPLOAD */

.uploadArea{
border:2px dashed #7bb7ff;
padding:35px;
text-align:center;
border-radius:12px;
cursor:pointer;
background:#f7fbff;
}

#bedFile{
display:none;
}

#fileName{
font-size:13px;
margin-top:6px;
color:#777;
}

/* BUTTON */

button{
background:#0a6cff;
color:white;
border:none;
padding:10px 16px;
border-radius:8px;
cursor:pointer;
}

/* NOTIFICATIONS */

.notice{
background:white;
padding:14px;
border-radius:10px;
margin-bottom:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.popupBox{
background:white;
padding:25px;
border-radius:14px;
width:90%;
max-width:420px;
text-align:center;
}

.popupBox input,
.popupBox select{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ddd;
border-radius:8px;
}

/* PDF VIEWER */

#pdfContainer{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
z-index:10000;
overflow:auto;
touch-action:pan-x pan-y;
}

canvas{
display:block;
margin:auto;
margin-bottom:10px;
}

</style>
</head>

<body>

<header id="header">B.Ed Vault</header>

<div class="container" id="mainUI">

<div class="card">

<h3>Upload .bed File to Decrypt</h3>

<label class="uploadArea" onclick="bedFile.click()">
Upload .bed file
<div id="fileName">No file selected</div>
</label>

<input type="file" id="bedFile" accept=".bed">

<br><br>

<button onclick="startDecrypt()">Decrypt</button>

</div>

<div class="card">

<h3>TNTEU Notifications</h3>

<div id="noticeList"></div>

</div>

</div>

<!-- SUB POPUP -->

<div id="subPopup" class="popup">

<div class="popupBox">

<h2>B.Ed Vault Access</h2>

<p>Activate your device</p>

<h3>₹149</h3>

<p>UPI: yourupi@upi</p>

<button onclick="openForm()">Proceed</button>

</div>

</div>

<!-- DETAILS POPUP -->

<div id="formPopup" class="popup">

<div class="popupBox">

<h3>Your Details</h3>

<input id="nameInput" placeholder="Name">

<input id="ageInput" placeholder="Age">

<select id="genderInput">
<option value="">Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<input id="deviceId" readonly>

<button onclick="sendWhatsapp()">Send</button>

</div>

</div>

<!-- PDF VIEWER -->

<div id="pdfContainer">
<div id="pdfViewer"></div>
</div>

<script>

/* ACTIVATED DEVICE IDS */

const activatedDevices=[
"DEV-demo123"
]

/* DEVICE ID */

function getDeviceId(){

let id=localStorage.getItem("bed_id")

if(!id){

id="DEV-"+Math.random().toString(36).substr(2,9)

localStorage.setItem("bed_id",id)

}

return id

}

/* FILE NAME */

bedFile.onchange=function(){

if(this.files.length){
fileName.innerText=this.files[0].name
}

}

/* POPUPS */

function startDecrypt(){

if(!activatedDevices.includes(getDeviceId())){

subPopup.style.display="flex"
return

}

decryptFile()

}

function openForm(){

subPopup.style.display="none"
formPopup.style.display="flex"

deviceId.value=getDeviceId()

}

/* WHATSAPP */

function sendWhatsapp(){

let name=nameInput.value
let age=ageInput.value
let gender=genderInput.value
let device=getDeviceId()

if(!name||!age||!gender) return

let msg=`Name:${name}
Age:${age}
Gender:${gender}
Device:${device}

Please activate.`

window.open("https://wa.me/919655969516?text="+encodeURIComponent(msg))

}

/* TNTEU NOTIFICATIONS */

async function loadNotifications(){

if(!activatedDevices.includes(getDeviceId())) return

const proxy="https://api.codetabs.com/v1/proxy/?quest="
const target="https://www.tnteu.ac.in/notifications.php?nid=5"

try{

const res=await fetch(proxy+encodeURIComponent(target))
const html=await res.text()

const doc=new DOMParser().parseFromString(html,"text/html")

const links=doc.querySelectorAll(".sectionWrapper a")

noticeList.innerHTML=""

links.forEach((a,i)=>{

if(i>10) return

let url="https://www.tnteu.ac.in/"+a.getAttribute("href")

let div=document.createElement("div")
div.className="notice"

div.innerHTML=`
<a href="${url}" target="_blank" style="text-decoration:none;color:#333;font-weight:500">
${a.innerText}
</a>
`

noticeList.appendChild(div)

})

}catch(e){}

}

loadNotifications()

/* PDF VIEWER */

let pdfDoc=null
let baseScale=1
let zoomScale=1
let pdfData=null

async function decryptFile(){

let file=bedFile.files[0]

if(!file) return

document.getElementById("mainUI").style.display="none"
document.getElementById("header").style.display="none"

pdfContainer.style.display="block"

const buffer=await file.arrayBuffer()

const iv=buffer.slice(0,12)
const keyData=buffer.slice(12,44)
const encrypted=buffer.slice(44)

const key=await crypto.subtle.importKey(
"raw",
keyData,
{name:"AES-GCM"},
false,
["decrypt"]
)

const decrypted=await crypto.subtle.decrypt(
{name:"AES-GCM",iv:new Uint8Array(iv)},
key,
encrypted
)

pdfData=new Uint8Array(decrypted)

loadPDF()

}

async function loadPDF(){

const loadingTask=pdfjsLib.getDocument({data:pdfData})

pdfDoc=await loadingTask.promise

const containerWidth=window.innerWidth

const page=await pdfDoc.getPage(1)

const viewport=page.getViewport({scale:1})

baseScale=containerWidth/viewport.width

zoomScale=1

renderPages()

}

async function renderPages(){

pdfViewer.innerHTML=""

const scale=baseScale*zoomScale
const dpr=window.devicePixelRatio||1

for(let pageNum=1;pageNum<=pdfDoc.numPages;pageNum++){

const page=await pdfDoc.getPage(pageNum)

const viewport=page.getViewport({scale:scale})

const canvas=document.createElement("canvas")
const ctx=canvas.getContext("2d")

canvas.width=viewport.width*dpr
canvas.height=viewport.height*dpr

canvas.style.width=viewport.width+"px"
canvas.style.height=viewport.height+"px"

ctx.scale(dpr,dpr)

pdfViewer.appendChild(canvas)

await page.render({canvasContext:ctx,viewport}).promise

}

}

/* PINCH ZOOM */

let startDist=0

pdfContainer.addEventListener("touchstart",function(e){

if(e.touches.length==2){
startDist=getDistance(e.touches)
}

})

pdfContainer.addEventListener("touchmove",function(e){

if(e.touches.length==2){

e.preventDefault()

let newDist=getDistance(e.touches)

let diff=newDist-startDist

zoomScale+=diff*0.005

if(zoomScale<1) zoomScale=1
if(zoomScale>5) zoomScale=5

startDist=newDist

renderPages()

}

})

function getDistance(touches){

let dx=touches[0].clientX-touches[1].clientX
let dy=touches[0].clientY-touches[1].clientY

return Math.sqrt(dx*dx+dy*dy)

}

</script>

</body>
</html>
