<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>B.Ed Vault</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#eef2f7;
padding:20px;
color:#222;
}

#bedFile{
display:none;
}

header{
text-align:center;
margin-bottom:25px;
}

header h1{
font-size:32px;
color:#0077ff;
}

.container{
max-width:900px;
margin:auto;
}

.uploadBox{
background:white;
padding:20px;
border-radius:8px;
}

.uploadArea{
border:2px dashed #7bb7ff;
padding:40px;
background:#f7fbff;
cursor:pointer;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:140px;
text-align:center;
}

#fileName{
margin-top:6px;
font-size:13px;
color:#666;
}

button{
background:#0077ff;
color:white;
border:none;
padding:10px 18px;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#005fd1;
}

</style>

</head>

<body>

<header>
<h1>B.Ed Vault</h1>
</header>

<div class="container">

<div class="uploadBox">

<h3>Upload .bed File to Decrypt</h3>

<label class="uploadArea" onclick="bedFile.click()">

Upload .bed file
<div id="fileName">No file selected</div>

</label>

<input type="file" id="bedFile" accept=".bed">

<button onclick="decryptFile()">Decrypt File</button>

</div>

</div>

<script>

/* show file name */

bedFile.onchange=function(){
fileName.innerText=this.files[0].name
}

/* decrypt */

async function decryptFile(){

let file = bedFile.files[0]

if(!file){
alert("Upload .bed file")
return
}

const buffer = await file.arrayBuffer()

const iv = buffer.slice(0,12)
const keyData = buffer.slice(12,44)
const encrypted = buffer.slice(44)

const key = await crypto.subtle.importKey(
"raw",
keyData,
{name:"AES-GCM"},
false,
["decrypt"]
)

const decrypted = await crypto.subtle.decrypt(
{name:"AES-GCM",iv:new Uint8Array(iv)},
key,
encrypted
)

const blob = new Blob([decrypted],{type:"application/pdf"})

/* save to indexedDB */

const request = indexedDB.open("pdfDB",1)

request.onupgradeneeded = function(e){

let db = e.target.result
db.createObjectStore("files")

}

request.onsuccess = function(e){

let db = e.target.result
let tx = db.transaction("files","readwrite")
let store = tx.objectStore("files")

store.put(blob,"pdf")

window.location.href="viewer.html"

}

}
</script>

</body>
</html>
