<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>B.Ed Vault</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#eef2f7;
padding:20px;
}

/* hidden file input */

#bedFile{
display:none;
}

header{
text-align:center;
margin-bottom:25px;
}

header h1{
font-size:32px;
color:#0077ff;
}

.container{
max-width:900px;
margin:auto;
}

/* upload area */

.uploadBox{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
}

.uploadArea{
border:2px dashed #7bb7ff;
padding:40px;
background:#f7fbff;
cursor:pointer;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:140px;
text-align:center;
}

#fileName{
margin-top:6px;
font-size:13px;
color:#666;
}

button{
background:#0077ff;
color:white;
border:none;
padding:10px 18px;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

/* PDF viewer */

#pdfContainer{
background:white;
border-radius:8px;
overflow:auto;
height:80vh;
touch-action:pan-x pan-y;
}

canvas{
display:block;
margin:auto;
margin-bottom:10px;
}

/* FULLSCREEN READER MODE */

.fullscreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:9999;
background:white;
border-radius:0;
}

</style>

</head>

<body>

<header id="header">
<h1>B.Ed Vault</h1>
</header>

<div class="container" id="mainContainer">

<div class="uploadBox" id="uploadBox">

<h3>Upload .bed File to Decrypt</h3>

<label class="uploadArea" onclick="document.getElementById('bedFile').click()">
Upload .bed file
<div id="fileName">No file selected</div>
</label>

<input type="file" id="bedFile" accept=".bed">

<button onclick="decryptFile()">Decrypt File</button>

</div>

<div id="pdfContainer">
<div id="pdfViewer"></div>
</div>

</div>

<script>

const bedFile = document.getElementById("bedFile")
const fileName = document.getElementById("fileName")

bedFile.onchange=function(){

if(this.files.length){
fileName.innerText=this.files[0].name
}

}

let pdfDoc=null
let baseScale=1
let zoomScale=1
let pdfData=null

async function decryptFile(){

let file = bedFile.files[0]

if(!file){
return
}

/* switch to reader mode */

document.getElementById("uploadBox").style.display="none"
document.getElementById("header").style.display="none"

const container=document.getElementById("pdfContainer")
container.classList.add("fullscreen")

/* decrypt */

const buffer = await file.arrayBuffer()

const iv = buffer.slice(0,12)
const keyData = buffer.slice(12,44)
const encrypted = buffer.slice(44)

const key = await crypto.subtle.importKey(
"raw",
keyData,
{name:"AES-GCM"},
false,
["decrypt"]
)

const decrypted = await crypto.subtle.decrypt(
{name:"AES-GCM",iv:new Uint8Array(iv)},
key,
encrypted
)

pdfData = new Uint8Array(decrypted)

loadPDF()

}

/* load pdf */

async function loadPDF(){

const loadingTask = pdfjsLib.getDocument({data:pdfData})

pdfDoc = await loadingTask.promise

const containerWidth=document.getElementById("pdfContainer").clientWidth

const page=await pdfDoc.getPage(1)

const viewport=page.getViewport({scale:1})

baseScale=containerWidth/viewport.width

zoomScale=1

renderPages()

}

/* render pages */

async function renderPages(){

const viewer=document.getElementById("pdfViewer")
viewer.innerHTML=""

const scale=baseScale*zoomScale
const dpr=window.devicePixelRatio||1

for(let pageNum=1;pageNum<=pdfDoc.numPages;pageNum++){

const page=await pdfDoc.getPage(pageNum)

const viewport=page.getViewport({scale:scale})

const canvas=document.createElement("canvas")
const context=canvas.getContext("2d")

canvas.width=viewport.width*dpr
canvas.height=viewport.height*dpr

canvas.style.width=viewport.width+"px"
canvas.style.height=viewport.height+"px"

context.scale(dpr,dpr)

viewer.appendChild(canvas)

await page.render({
canvasContext:context,
viewport:viewport
}).promise

}

}

/* pinch zoom */

let startDist=0

const container=document.getElementById("pdfContainer")

container.addEventListener("touchstart",function(e){

if(e.touches.length==2){
startDist=getDistance(e.touches)
}

})

container.addEventListener("touchmove",function(e){

if(e.touches.length==2){

e.preventDefault()

let newDist=getDistance(e.touches)

let diff=newDist-startDist

zoomScale+=diff*0.005

if(zoomScale<1) zoomScale=1
if(zoomScale>5) zoomScale=5

startDist=newDist

renderPages()

}

})

function getDistance(touches){

let dx=touches[0].clientX - touches[1].clientX
let dy=touches[0].clientY - touches[1].clientY

return Math.sqrt(dx*dx+dy*dy)

}

</script>

</body>
</html>
